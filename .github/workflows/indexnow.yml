name: IndexNow

on:
  push:
    branches: [master]
    paths:
      - "src/**/*.md"
      - "src/**/*.njk"
      - "!src/_includes/**"
      - "!src/_data/**"
      - "!src/sitemap.njk"
      - "!src/robots.njk"
      - "!src/dump.njk"

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed URLs
        id: urls
        run: |
          SITE_URL="https://cb.objz.dev"

          CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- \
            'src/**/*.md' 'src/**/*.njk' \
            ':!src/_includes/**' ':!src/_data/**' \
            ':!src/sitemap.njk' ':!src/robots.njk' ':!src/dump.njk' ':!src/404.njk')

          if [ -z "$CHANGED_FILES" ]; then
            echo "No content files changed."
            echo "has_urls=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          URLS=""
          while IFS= read -r file; do
            path="${file#src/}"
            path="${path%.*}"
            path="${path%/index}"
            [[ "$path" != /* ]] && path="/$path"
            [[ "$path" != */ ]] && path="$path/"
            url="${SITE_URL}${path}"
            URLS="${URLS:+$URLS\n}$url"
          done <<< "$CHANGED_FILES"

          echo -e "URLs to submit:\n$URLS"

          JSON_ARRAY=$(echo -e "$URLS" | jq -R -s 'split("\n") | map(select(length > 0))')
          echo "url_list=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
          echo "has_urls=true" >> "$GITHUB_OUTPUT"

      - name: Submit to IndexNow
        if: steps.urls.outputs.has_urls == 'true'
        run: |
          KEY="40bb6310612d4190a9fd9564d6911650"

          PAYLOAD=$(jq -n \
            --arg host "cb.objz.dev" \
            --arg key "$KEY" \
            --argjson urlList '${{ steps.urls.outputs.url_list }}' \
            '{host: $host, key: $key, urlList: $urlList}')

          echo "Submitting to IndexNow:"
          echo "$PAYLOAD" | jq .

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "Response status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "IndexNow submission successful"
          else
            echo "::warning::IndexNow returned HTTP $HTTP_STATUS"
          fi
