<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 88" width="840" height="88">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
  </defs>
  <rect width="840" height="88" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="87" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">Transport</text>
  <text x="24" y="54" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">Choose one</text>

  <!-- Divider -->
  <line x1="155" y1="16" x2="155" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- WebSocket card — blue (#60a5fa) -->
  <g transform="translate(170, 14)">
    <rect x="0" y="0" width="306" height="60" rx="10" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.12)" stroke-width="0.75"/>
    <circle cx="26" cy="30" r="14" fill="rgba(96,165,250,0.1)"/>
    <!-- radio icon -->
    <g transform="translate(18, 22) scale(0.667)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9" />
      <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5" />
      <circle cx="12" cy="12" r="2" />
      <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5" />
      <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19" />
    </g>
    <text x="48" y="26" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#60a5fa">WebSocket</text>
    <text x="48" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">Direct &#xB7; TLS &#xB7; No dependencies</text>
  </g>

  <!-- "or" pill — centered between cards -->
  <rect x="484" y="36" width="28" height="16" rx="8" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
  <text x="498" y="47" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="8" fill="#737373">or</text>

  <!-- Redis card — rose (#fb7185) -->
  <g transform="translate(520, 14)">
    <rect x="0" y="0" width="306" height="60" rx="10" fill="rgba(251,113,133,0.05)" stroke="rgba(251,113,133,0.12)" stroke-width="0.75"/>
    <circle cx="26" cy="30" r="14" fill="rgba(251,113,133,0.1)"/>
    <!-- database icon -->
    <g transform="translate(18, 22) scale(0.667)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="9" ry="3" />
      <path d="M3 5V19A9 3 0 0 0 21 19V5" />
      <path d="M3 12A9 3 0 0 0 21 12" />
    </g>
    <text x="48" y="26" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="12" fill="#fb7185">Redis</text>
    <text x="48" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">NAT-friendly &#xB7; Pub/Sub &#xB7; Multi-proxy</text>
  </g>
</svg>
