<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 88" width="840" height="88">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
  </defs>
  <rect width="840" height="88" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="87" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- WebSocket side -->
  <circle cx="40" cy="44" r="16" fill="rgba(96,165,250,0.12)"/>
  <g transform="translate(31, 35) scale(0.75)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9" />
    <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5" />
    <circle cx="12" cy="12" r="2" />
    <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5" />
    <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19" />
  </g>
  <text x="72" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">WebSocket</text>
  <text x="72" y="54" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#7dd3fc">Direct proxy-to-backend</text>
  <!-- Checkmarks -->
  <text x="72" y="72" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">TLS encryption &#8226; No dependencies &#8226; Auto-reconnect</text>

  <!-- Divider -->
  <line x1="392" y1="16" x2="392" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="3 4"/>
  <rect x="378" y="36" width="28" height="16" rx="8" fill="#0c1222" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
  <text x="392" y="48" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="8" fill="#737373">or</text>

  <!-- Redis side -->
  <circle cx="436" cy="44" r="16" fill="rgba(251,113,133,0.12)"/>
  <g transform="translate(427, 35) scale(0.75)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="12" cy="5" rx="9" ry="3" />
    <path d="M3 5V19A9 3 0 0 0 21 19V5" />
    <path d="M3 12A9 3 0 0 0 21 12" />
  </g>
  <text x="468" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">Redis</text>
  <text x="468" y="54" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#fb7185">Centralized message broker</text>
  <text x="468" y="72" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">NAT-friendly &#8226; Pub/Sub &#8226; Multi-proxy</text>

  <!-- Recommended pill -->
  <rect x="740" y="30" width="80" height="20" rx="10" fill="rgba(110,231,183,0.1)" stroke="rgba(110,231,183,0.2)" stroke-width="0.75"/>
  <text x="780" y="44" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="8" fill="#6ee7b7">DUAL TRANSPORT</text>
</svg>
