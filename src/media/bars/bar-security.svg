<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 88" width="840" height="88">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8268F0"/>
      <stop offset="100%" stop-color="#4736D3"/>
    </linearGradient>
  </defs>
  <rect width="840" height="88" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="87" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Shield icon -->
  <g transform="translate(40, 44)">
    <g transform="translate(-15, -17) scale(1.25)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
    </g>
  </g>

  <!-- HMAC label -->
  <text x="72" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#fafafa">Secure by Default</text>
  <text x="72" y="50" font-family="Inter, monospace" font-weight="500" font-size="10" fill="#a5b4fc">HMAC-SHA256 mutual authentication</text>

  <!-- Divider -->
  <line x1="340" y1="16" x2="340" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Trust modes -->
  <!-- TOFU -->
  <rect x="360" y="16" width="80" height="24" rx="8" fill="rgba(110,231,183,0.08)" stroke="rgba(110,231,183,0.18)" stroke-width="0.75"/>
  <g transform="translate(370, 24) scale(0.375)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 6 9 17l-5-5" />
  </g>
  <text x="388" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#6ee7b7">TOFU</text>

  <!-- STRICT -->
  <rect x="450" y="16" width="92" height="24" rx="8" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.18)" stroke-width="0.75"/>
  <g transform="translate(459, 22) scale(0.375)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
  </g>
  <text x="476" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#60a5fa">STRICT</text>

  <!-- PLAIN -->
  <rect x="552" y="16" width="80" height="24" rx="8" fill="rgba(251,191,36,0.08)" stroke="rgba(251,191,36,0.18)" stroke-width="0.75"/>
  <text x="592" y="32" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#fbbf24">PLAIN</text>

  <!-- TLS row -->
  <rect x="360" y="50" width="72" height="22" rx="8" fill="rgba(125,211,252,0.08)" stroke="rgba(125,211,252,0.15)" stroke-width="0.75"/>
  <text x="396" y="65" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="9" fill="#7dd3fc">TLS 1.3</text>

  <rect x="442" y="50" width="100" height="22" rx="8" fill="rgba(165,180,252,0.08)" stroke="rgba(165,180,252,0.15)" stroke-width="0.75"/>
  <text x="492" y="65" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="9" fill="#a5b4fc">Encrypted</text>

  <!-- Right label -->
  <line x1="660" y1="16" x2="660" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <text x="750" y="38" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">3 Modes</text>
  <text x="750" y="56" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#a3a3a3">Trust levels</text>
</svg>
