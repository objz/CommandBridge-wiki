<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 88" width="840" height="88">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
  </defs>
  <rect width="840" height="88" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="87" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">Security</text>
  <text x="24" y="54" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">HMAC-SHA256 auth</text>

  <!-- Divider -->
  <line x1="155" y1="16" x2="155" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- TOFU card — green (#6ee7b7) -->
  <g transform="translate(170, 14)">
    <rect x="0" y="0" width="200" height="60" rx="10" fill="rgba(110,231,183,0.05)" stroke="rgba(110,231,183,0.12)" stroke-width="0.75"/>
    <circle cx="28" cy="30" r="14" fill="rgba(110,231,183,0.1)"/>
    <!-- shield-check icon -->
    <g transform="translate(20, 22) scale(0.667)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
      <path d="m9 12 2 2 4-4" />
    </g>
    <text x="52" y="26" font-family="Inter, monospace" font-weight="700" font-size="11" fill="#6ee7b7">TOFU</text>
    <text x="52" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">Trust on First Use</text>
  </g>

  <!-- STRICT card — blue (#60a5fa) -->
  <g transform="translate(385, 14)">
    <rect x="0" y="0" width="200" height="60" rx="10" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.12)" stroke-width="0.75"/>
    <circle cx="28" cy="30" r="14" fill="rgba(96,165,250,0.1)"/>
    <!-- lock icon -->
    <g transform="translate(20, 22) scale(0.667)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </g>
    <text x="52" y="26" font-family="Inter, monospace" font-weight="700" font-size="11" fill="#60a5fa">STRICT</text>
    <text x="52" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">Certificate Pinning</text>
  </g>

  <!-- PLAIN card — amber (#fbbf24) -->
  <g transform="translate(600, 14)">
    <rect x="0" y="0" width="220" height="60" rx="10" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.12)" stroke-width="0.75"/>
    <circle cx="28" cy="30" r="14" fill="rgba(251,191,36,0.1)"/>
    <!-- lock-open icon -->
    <g transform="translate(20, 22) scale(0.667)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 9.9-1" />
    </g>
    <text x="52" y="26" font-family="Inter, monospace" font-weight="700" font-size="11" fill="#fbbf24">PLAIN</text>
    <text x="52" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">No encryption</text>
  </g>
</svg>
