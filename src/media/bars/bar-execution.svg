<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 88" width="840" height="88">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
  </defs>
  <rect width="840" height="88" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="87" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Title -->
  <text x="24" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#fafafa">Execution Modes</text>
  <text x="24" y="54" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">Run commands as</text>

  <!-- Divider -->
  <line x1="180" y1="16" x2="180" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- CONSOLE mode -->
  <g transform="translate(200, 14)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="rgba(110,231,183,0.05)" stroke="rgba(110,231,183,0.12)" stroke-width="0.75"/>
    <circle cx="28" cy="30" r="14" fill="rgba(110,231,183,0.1)"/>
    <!-- Terminal icon -->
    <g transform="translate(20, 22) scale(0.667)" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 17 10 11 4 5" />
      <line x1="12" x2="20" y1="19" y2="19" />
    </g>
    <text x="52" y="26" font-family="Inter, monospace" font-weight="700" font-size="11" fill="#6ee7b7">CONSOLE</text>
    <text x="52" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">Server console</text>
  </g>

  <!-- PLAYER mode -->
  <g transform="translate(400, 14)">
    <rect x="0" y="0" width="180" height="60" rx="10" fill="rgba(96,165,250,0.05)" stroke="rgba(96,165,250,0.12)" stroke-width="0.75"/>
    <circle cx="28" cy="30" r="14" fill="rgba(96,165,250,0.1)"/>
    <!-- User icon -->
    <g transform="translate(20, 22) scale(0.667)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="8" r="4" />
      <path d="M6 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2" />
    </g>
    <text x="52" y="26" font-family="Inter, monospace" font-weight="700" font-size="11" fill="#60a5fa">PLAYER</text>
    <text x="52" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">As the player</text>
  </g>

  <!-- OPERATOR mode -->
  <g transform="translate(600, 14)">
    <rect x="0" y="0" width="218" height="60" rx="10" fill="rgba(251,191,36,0.05)" stroke="rgba(251,191,36,0.12)" stroke-width="0.75"/>
    <circle cx="28" cy="30" r="14" fill="rgba(251,191,36,0.1)"/>
    <!-- Shield icon -->
    <g transform="translate(20, 22) scale(0.667)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
    </g>
    <text x="52" y="26" font-family="Inter, monospace" font-weight="700" font-size="11" fill="#fbbf24">OPERATOR</text>
    <text x="52" y="42" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#737373">Temporary elevated perms</text>
  </g>
</svg>
