<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 88" width="840" height="88">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="840" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
  </defs>
  <rect width="840" height="88" rx="12" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="839" height="87" rx="12" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>

  <!-- Left: Big number + label -->
  <text x="52" y="42" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="30" fill="#fafafa">22</text>
  <text x="52" y="58" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#a3a3a3">Argument</text>
  <text x="52" y="70" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#a3a3a3">Types</text>

  <!-- Divider -->
  <line x1="108" y1="16" x2="108" y2="72" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Row 1: Universal + important types (y=18, 22px tall pills) -->

  <!-- STRING — blue (basic primitive, default) -->
  <rect x="122" y="18" width="56" height="22" rx="6" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.15)" stroke-width="0.75"/>
  <text x="150" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#60a5fa">STRING</text>

  <!-- PLAYERS — green (player/entity targeting) -->
  <rect x="184" y="18" width="60" height="22" rx="6" fill="rgba(110,231,183,0.1)" stroke="rgba(110,231,183,0.15)" stroke-width="0.75"/>
  <text x="214" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#6ee7b7">PLAYERS</text>

  <!-- INTEGER — amber (numeric) -->
  <rect x="250" y="18" width="60" height="22" rx="6" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.15)" stroke-width="0.75"/>
  <text x="280" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#fbbf24">INTEGER</text>

  <!-- BOOLEAN — blue (basic primitive) -->
  <rect x="316" y="18" width="60" height="22" rx="6" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.15)" stroke-width="0.75"/>
  <text x="346" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#60a5fa">BOOLEAN</text>

  <!-- GREEDY_STRING — indigo (text variant) -->
  <rect x="382" y="18" width="94" height="22" rx="6" fill="rgba(165,180,252,0.1)" stroke="rgba(165,180,252,0.15)" stroke-width="0.75"/>
  <text x="429" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#a5b4fc">GREEDY_STRING</text>

  <!-- DOUBLE — amber (numeric) -->
  <rect x="482" y="18" width="56" height="22" rx="6" fill="rgba(251,191,36,0.1)" stroke="rgba(251,191,36,0.15)" stroke-width="0.75"/>
  <text x="510" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#fbbf24">DOUBLE</text>

  <!-- TEXT — indigo (text variant) -->
  <rect x="544" y="18" width="44" height="22" rx="6" fill="rgba(165,180,252,0.1)" stroke="rgba(165,180,252,0.15)" stroke-width="0.75"/>
  <text x="566" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#a5b4fc">TEXT</text>

  <!-- SERVER — rose (platform-specific) -->
  <rect x="594" y="18" width="56" height="22" rx="6" fill="rgba(251,113,133,0.1)" stroke="rgba(251,113,133,0.15)" stroke-width="0.75"/>
  <text x="622" y="33" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#fb7185">SERVER</text>

  <!-- Row 2: Minecraft types + overflow (y=48, 22px tall pills) -->

  <!-- LOCATION — cyan (spatial) -->
  <rect x="122" y="48" width="66" height="22" rx="6" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.15)" stroke-width="0.75"/>
  <text x="155" y="63" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#22d3ee">LOCATION</text>

  <!-- WORLD — cyan (spatial) -->
  <rect x="194" y="48" width="50" height="22" rx="6" fill="rgba(34,211,238,0.1)" stroke="rgba(34,211,238,0.15)" stroke-width="0.75"/>
  <text x="219" y="63" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#22d3ee">WORLD</text>

  <!-- ENTITIES — green (player/entity) -->
  <rect x="250" y="48" width="66" height="22" rx="6" fill="rgba(110,231,183,0.1)" stroke="rgba(110,231,183,0.15)" stroke-width="0.75"/>
  <text x="283" y="63" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#6ee7b7">ENTITIES</text>

  <!-- ITEM_STACK — purple (items/effects) -->
  <rect x="322" y="48" width="76" height="22" rx="6" fill="rgba(192,132,252,0.1)" stroke="rgba(192,132,252,0.15)" stroke-width="0.75"/>
  <text x="360" y="63" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#c084fc">ITEM_STACK</text>

  <!-- ENCHANTMENT — purple (items/effects) -->
  <rect x="404" y="48" width="82" height="22" rx="6" fill="rgba(192,132,252,0.1)" stroke="rgba(192,132,252,0.15)" stroke-width="0.75"/>
  <text x="445" y="63" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#c084fc">ENCHANTMENT</text>

  <!-- ENTITY_TYPE — green (player/entity) -->
  <rect x="492" y="48" width="82" height="22" rx="6" fill="rgba(110,231,183,0.1)" stroke="rgba(110,231,183,0.15)" stroke-width="0.75"/>
  <text x="533" y="63" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="9" fill="#6ee7b7">ENTITY_TYPE</text>

  <!-- +8 more (muted overflow indicator) -->
  <rect x="580" y="48" width="40" height="22" rx="6" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="0.75"/>
  <text x="600" y="63" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="9" fill="#737373">+8</text>
</svg>
