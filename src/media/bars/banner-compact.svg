<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 56" width="840" height="56">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="banner-bg" x1="0" y1="0" x2="840" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0" y1="0" x2="840" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="840" height="56" rx="10" fill="url(#banner-bg)"/>

  <!-- Bottom accent line -->
  <clipPath id="banner-clip">
    <rect width="840" height="56" rx="10"/>
  </clipPath>
  <rect x="0" y="54" width="840" height="2" fill="url(#accent-line)" clip-path="url(#banner-clip)"/>

  <!-- CommandBridge Logo (real icon, 40px) -->
  <svg x="10" y="8" width="40" height="40" viewBox="-0.412 0.794 501.187 501.95">
    <defs>
      <linearGradient id="cb-grad" gradientUnits="userSpaceOnUse" x1="249.386" y1="-0.602" x2="249.386" y2="500.471" gradientTransform="matrix(0.699766, -0.711372, 1.00003, 0.983714, -175.220732, 180.486511)">
        <stop style="stop-color: rgb(39, 58, 102);" offset="0"/>
        <stop style="stop-color: rgb(8, 17, 35);" offset="1"/>
      </linearGradient>
      <filter id="cb-shadow" color-interpolation-filters="sRGB" x="-50%" y="-50%" width="200%" height="200%">
        <feOffset dx="0" dy="0"/>
        <feGaussianBlur stdDeviation="8"/>
        <feComposite operator="out" in="SourceGraphic"/>
        <feComponentTransfer result="choke">
          <feFuncA type="linear" slope="0.62"/>
        </feComponentTransfer>
        <feFlood flood-color="#38509cb3" result="color"/>
        <feComposite operator="in" in="color" in2="choke" result="shadow"/>
        <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
      </filter>
    </defs>
    <rect x="0.626" y="1.779" width="499.341" height="500" rx="92.425" ry="92.425" style="fill: url(#cb-grad); filter: url(#cb-shadow); stroke: rgb(16, 23, 45); stroke-miterlimit: 2.55; stroke-width: 1.996px;"/>
    <path d="M 230.951 356.62 L 335.726 229.892 C 340.716 221.909 335.726 214.924 325.748 214.924 L 275.855 214.924 C 265.876 214.924 264.261 211.99 265.876 201.952 L 273.859 142.08 C 275.855 132.101 269.086 126.654 260.887 137.091 L 161.101 257.832 C 156.112 265.815 161.101 270.804 171.08 270.804 L 220.973 270.804 C 230.951 270.804 233.945 273.797 230.951 283.776 L 215.983 352.628 C 213.988 362.607 218.977 366.598 225.962 361.609 L 230.951 356.62 Z" style="fill: rgb(71, 54, 211); stroke-opacity: 0.58; stroke: rgb(130, 104, 240); stroke-width: 0.998px;"/>
  </svg>

  <!-- "CommandBridge" text -->
  <text x="58" y="33" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#ffffff">CommandBridge</text>

  <!-- Right side subtitle -->
  <text x="816" y="33" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#a3a3a3" text-anchor="end">Open Source Minecraft Plugin</text>
</svg>
