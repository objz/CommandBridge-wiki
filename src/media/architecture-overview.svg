<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <filter id="hub-glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.278 0 0 0 0 0.212 0 0 0 0 0.82 0 0 0 0.25 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-down" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <polygon points="0 0, 8 0, 4 6" fill="#a5b4fc" opacity="0.6"/>
    </marker>
    <marker id="arr-up" markerWidth="8" markerHeight="6" refX="4" refY="0" orient="auto">
      <polygon points="0 6, 8 6, 4 0" fill="#6ee7b7" opacity="0.6"/>
    </marker>
    <marker id="arr-right" markerWidth="6" markerHeight="8" refX="6" refY="4" orient="auto">
      <polygon points="0 0, 6 4, 0 8" fill="#a5b4fc" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Section label -->
  <text x="600" y="42" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#8268F0" letter-spacing="3">OVERVIEW</text>

  <!-- Title -->
  <text x="600" y="76" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="32" fill="#fafafa" letter-spacing="-1">Architecture Overview</text>

  <!-- ===== Layer 1: Players ===== -->
  <g transform="translate(600, 130)">
    <rect x="-80" y="-16" width="160" height="32" rx="16" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Player icons -->
    <circle cx="-40" cy="0" r="5" fill="rgba(165,180,252,0.3)"/>
    <circle cx="-20" cy="0" r="5" fill="rgba(165,180,252,0.3)"/>
    <circle cx="0" cy="0" r="5" fill="rgba(165,180,252,0.3)"/>
    <circle cx="20" cy="0" r="5" fill="rgba(165,180,252,0.3)"/>
    <circle cx="40" cy="0" r="5" fill="rgba(165,180,252,0.3)"/>
  </g>
  <text x="600" y="138" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="10" fill="#a3a3a3">Players</text>

  <!-- Arrow: Players -> Velocity -->
  <line x1="600" y1="152" x2="600" y2="178" stroke="rgba(165,180,252,0.3)" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- ===== Layer 2: Velocity Proxy ===== -->
  <g transform="translate(600, 210)">
    <rect x="-130" y="-22" width="260" height="44" rx="12" fill="rgba(96,165,250,0.08)" stroke="rgba(96,165,250,0.3)" stroke-width="1.5"/>
    <!-- Send icon (Lucide) -->
    <g transform="translate(-110, -10) scale(0.625)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z" />
      <path d="m21.854 2.147-10.94 10.939" />
    </g>
    <text x="0" y="5" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">Velocity Proxy</text>
    <text x="110" y="5" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#60a5fa" dominant-baseline="central">Required</text>
  </g>

  <!-- Arrow: Velocity -> CommandBridge -->
  <line x1="600" y1="236" x2="600" y2="268" stroke="rgba(165,180,252,0.3)" stroke-width="1.5" marker-end="url(#arr-down)"/>
  <!-- Bidirectional hint -->
  <text x="616" y="256" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="8" fill="#737373">commands</text>

  <!-- ===== Layer 3: CommandBridge Hub ===== -->
  <g transform="translate(600, 305)" filter="url(#hub-glow)">
    <rect x="-155" y="-32" width="310" height="64" rx="14" fill="rgba(99,102,241,0.1)" stroke="rgba(165,180,252,0.4)" stroke-width="2"/>
    <!-- Zap icon (Lucide) -->
    <g transform="translate(-128, -10) scale(0.75)" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z" />
    </g>
    <text x="0" y="2" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="18" fill="#fafafa">CommandBridge</text>
    <text x="0" y="18" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#a3a3a3">YAML Script Engine + Command Router</text>
  </g>

  <!-- YAML scripts callout (left) -->
  <g transform="translate(240, 295)">
    <rect x="-100" y="-18" width="200" height="36" rx="10" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-family="Inter, monospace" font-weight="500" font-size="10" fill="#c084fc">scripts/*.yml</text>
    <text x="0" y="15" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="8" fill="#737373">Commands defined in YAML</text>
  </g>
  <!-- Arrow to hub -->
  <line x1="340" y1="300" x2="440" y2="305" stroke="rgba(192,132,252,0.2)" stroke-width="1" stroke-dasharray="4 4" marker-end="url(#arr-right)"/>

  <!-- Permissions callout (right) -->
  <g transform="translate(960, 295)">
    <rect x="-100" y="-18" width="200" height="36" rx="10" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <text x="0" y="3" text-anchor="middle" font-family="Inter, monospace" font-weight="500" font-size="10" fill="#fbbf24">LuckPerms</text>
    <text x="0" y="15" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="8" fill="#737373">Permission management</text>
  </g>
  <line x1="860" y1="300" x2="760" y2="305" stroke="rgba(251,191,36,0.15)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- ===== Layer 4: Transport ===== -->
  <g transform="translate(600, 390)">
    <rect x="-200" y="-14" width="400" height="28" rx="14" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-dasharray="6 4"/>
    <rect x="-88" y="-9" width="80" height="18" rx="9" fill="rgba(125,211,252,0.1)"/>
    <text x="-48" y="4" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="9" fill="#7dd3fc">WebSocket</text>
    <rect x="8" y="-9" width="80" height="18" rx="9" fill="rgba(251,113,133,0.1)"/>
    <text x="48" y="4" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="9" fill="#fb7185">Redis Pub/Sub</text>
  </g>

  <!-- Arrows: Hub -> Transport -->
  <line x1="600" y1="340" x2="600" y2="374" stroke="rgba(165,180,252,0.25)" stroke-width="1.5" marker-end="url(#arr-down)"/>

  <!-- Arrows: Transport -> Backends -->
  <line x1="440" y1="404" x2="200" y2="460" stroke="rgba(110,231,183,0.2)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="520" y1="404" x2="430" y2="460" stroke="rgba(251,191,36,0.2)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="600" y1="404" x2="600" y2="460" stroke="rgba(251,113,133,0.2)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="680" y1="404" x2="770" y2="460" stroke="rgba(34,211,238,0.2)" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="760" y1="404" x2="1000" y2="460" stroke="rgba(110,231,183,0.2)" stroke-width="1.5" stroke-dasharray="5 4"/>

  <!-- Packet dots -->
  <circle cx="320" cy="432" r="2.5" fill="#6ee7b7" opacity="0.5"/>
  <circle cx="475" cy="432" r="2.5" fill="#fbbf24" opacity="0.5"/>
  <circle cx="600" cy="432" r="2.5" fill="#fb7185" opacity="0.5"/>
  <circle cx="725" cy="432" r="2.5" fill="#22d3ee" opacity="0.5"/>
  <circle cx="880" cy="432" r="2.5" fill="#6ee7b7" opacity="0.5"/>

  <!-- ===== Layer 5: Backend Servers ===== -->
  <!-- Paper -->
  <g transform="translate(200, 500)">
    <rect x="-70" y="-30" width="140" height="60" rx="10" fill="rgba(110,231,183,0.06)" stroke="rgba(110,231,183,0.25)" stroke-width="1"/>
    <circle cx="-38" cy="0" r="10" fill="rgba(110,231,183,0.15)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-46, -8) scale(0.667)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="10" y="-4" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#fafafa">Paper</text>
    <text x="10" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#6ee7b7">Backend</text>
  </g>

  <!-- Folia -->
  <g transform="translate(430, 500)">
    <rect x="-70" y="-30" width="140" height="60" rx="10" fill="rgba(251,191,36,0.06)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
    <circle cx="-38" cy="0" r="10" fill="rgba(251,191,36,0.15)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-46, -8) scale(0.667)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="10" y="-4" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#fafafa">Folia</text>
    <text x="10" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#fbbf24">Backend</text>
  </g>

  <!-- Purpur -->
  <g transform="translate(600, 500)">
    <rect x="-70" y="-30" width="140" height="60" rx="10" fill="rgba(251,113,133,0.06)" stroke="rgba(251,113,133,0.25)" stroke-width="1"/>
    <circle cx="-38" cy="0" r="10" fill="rgba(251,113,133,0.15)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-46, -8) scale(0.667)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="10" y="-4" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#fafafa">Purpur</text>
    <text x="10" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#fb7185">Backend</text>
  </g>

  <!-- Spigot -->
  <g transform="translate(770, 500)">
    <rect x="-70" y="-30" width="140" height="60" rx="10" fill="rgba(34,211,238,0.06)" stroke="rgba(34,211,238,0.25)" stroke-width="1"/>
    <circle cx="-38" cy="0" r="10" fill="rgba(34,211,238,0.15)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-46, -8) scale(0.667)" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="10" y="-4" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#fafafa">Spigot</text>
    <text x="10" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#22d3ee">Backend</text>
  </g>

  <!-- Bukkit -->
  <g transform="translate(1000, 500)">
    <rect x="-70" y="-30" width="140" height="60" rx="10" fill="rgba(110,231,183,0.06)" stroke="rgba(110,231,183,0.25)" stroke-width="1"/>
    <circle cx="-38" cy="0" r="10" fill="rgba(110,231,183,0.15)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-46, -8) scale(0.667)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="10" y="-4" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="13" fill="#fafafa">Bukkit</text>
    <text x="10" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#6ee7b7">Backend</text>
  </g>

  <!-- Layer labels (right side) -->
  <text x="1155" y="132" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#4a5568">CLIENTS</text>
  <text x="1155" y="212" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#4a5568">PROXY</text>
  <text x="1155" y="307" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#4a5568">PLUGIN</text>
  <text x="1155" y="392" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#4a5568">TRANSPORT</text>
  <text x="1155" y="502" text-anchor="end" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="9" fill="#4a5568">BACKENDS</text>

  <!-- Footer text -->
  <text x="600" y="590" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#737373">Full bidirectional command flow across your entire Minecraft network</text>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
</svg>
