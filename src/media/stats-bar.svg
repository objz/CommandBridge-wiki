<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="299" rx="16" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Stat 1: Platforms -->
  <g transform="translate(60, 50)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <!-- Icon circle -->
    <circle cx="120" cy="52" r="20" fill="rgba(96,165,250,0.12)" stroke="rgba(96,165,250,0.25)" stroke-width="1"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(108, 40) scale(1)" stroke="#a5b4fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <!-- Number -->
    <text x="120" y="110" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="42" fill="#fafafa">6</text>
    <!-- Label -->
    <text x="120" y="138" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="15" fill="#a3a3a3">Platforms</text>
    <!-- Detail -->
    <text x="120" y="162" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">Paper, Folia, Purpur, Spigot</text>
    <text x="120" y="178" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">Bukkit, Velocity</text>
  </g>

  <!-- Stat 2: Argument Types -->
  <g transform="translate(340, 50)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="120" cy="52" r="20" fill="rgba(165,180,252,0.12)" stroke="rgba(165,180,252,0.25)" stroke-width="1"/>
    <!-- Code icon (Lucide) -->
    <g transform="translate(108, 40) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="16 18 22 12 16 6" />
      <polyline points="8 6 2 12 8 18" />
    </g>
    <text x="120" y="110" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="42" fill="#fafafa">21</text>
    <text x="120" y="138" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="15" fill="#a3a3a3">Argument Types</text>
    <text x="120" y="162" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">Full tab completion</text>
    <text x="120" y="178" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">via CommandAPI</text>
  </g>

  <!-- Stat 3: MC Versions -->
  <g transform="translate(620, 50)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="120" cy="52" r="20" fill="rgba(110,231,183,0.12)" stroke="rgba(110,231,183,0.25)" stroke-width="1"/>
    <!-- Layers icon (Lucide) -->
    <g transform="translate(108, 40) scale(1)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83z" />
      <path d="M2 12a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 12" />
      <path d="M2 17a1 1 0 0 0 .58.91l8.6 3.91a2 2 0 0 0 1.65 0l8.58-3.9A1 1 0 0 0 22 17" />
    </g>
    <text x="120" y="110" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="36" fill="#fafafa">1.20&#8211;1.21</text>
    <text x="120" y="138" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="15" fill="#a3a3a3">MC Versions</text>
    <text x="120" y="162" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">Supports latest releases</text>
    <text x="120" y="178" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">and snapshots</text>
  </g>

  <!-- Stat 4: Java -->
  <g transform="translate(900, 50)">
    <rect x="0" y="0" width="240" height="200" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="120" cy="52" r="20" fill="rgba(251,191,36,0.12)" stroke="rgba(251,191,36,0.25)" stroke-width="1"/>
    <!-- CPU icon (Lucide) -->
    <g transform="translate(108, 40) scale(1)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 20v2" /><path d="M12 2v2" /><path d="M17 20v2" /><path d="M17 2v2" />
      <path d="M2 12h2" /><path d="M2 17h2" /><path d="M2 7h2" />
      <path d="M20 12h2" /><path d="M20 17h2" /><path d="M20 7h2" />
      <path d="M7 20v2" /><path d="M7 2v2" />
      <rect x="4" y="4" width="16" height="16" rx="2" />
      <rect x="8" y="8" width="8" height="8" rx="1" />
    </g>
    <text x="120" y="110" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="42" fill="#fafafa">21+</text>
    <text x="120" y="138" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="15" fill="#a3a3a3">Java Version</text>
    <text x="120" y="162" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">Modern runtime</text>
    <text x="120" y="178" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10.5" fill="#737373">with virtual threads</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="294" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
  <!-- Rounded bottom mask -->
  <rect x="0" y="0" width="1200" height="300" rx="16" fill="none" stroke="url(#bg)" stroke-width="0"/>
</svg>
