<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Section label -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#8268F0" letter-spacing="3">COMPATIBILITY</text>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#fafafa" letter-spacing="-1">Platform Support</text>

  <!-- Subtitle -->
  <text x="600" y="122" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#a3a3a3">Works with every major Minecraft server platform on the Velocity network</text>

  <!-- ===== Row 1: Proxy ===== -->
  <!-- Section divider label -->
  <text x="600" y="172" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#737373" letter-spacing="2">PROXY</text>
  <line x1="100" y1="178" x2="540" y2="178" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="660" y1="178" x2="1100" y2="178" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Velocity (full width card) -->
  <g transform="translate(600, 230)">
    <rect x="-260" y="-30" width="520" height="60" rx="12" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.25)" stroke-width="1.5"/>
    <!-- Send icon (Lucide) -->
    <circle cx="-210" cy="0" r="18" fill="rgba(96,165,250,0.15)"/>
    <g transform="translate(-222, -12) scale(1)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M14.536 21.686a.5.5 0 0 0 .937-.024l6.5-19a.496.496 0 0 0-.635-.635l-19 6.5a.5.5 0 0 0-.024.937l7.93 3.18a2 2 0 0 1 1.112 1.11z" />
      <path d="m21.854 2.147-10.94 10.939" />
    </g>
    <!-- Name -->
    <text x="-180" y="2" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="18" fill="#fafafa" dominant-baseline="central">Velocity</text>
    <!-- Role badge -->
    <rect x="-90" y="-10" width="56" height="20" rx="10" fill="rgba(96,165,250,0.12)"/>
    <text x="-62" y="4" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#60a5fa" dominant-baseline="central">PROXY</text>
    <!-- Required badge -->
    <rect x="-20" y="-10" width="72" height="20" rx="10" fill="rgba(251,191,36,0.12)"/>
    <text x="16" y="4" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#fbbf24" dominant-baseline="central">REQUIRED</text>
    <!-- Description -->
    <text x="70" y="4" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#737373" dominant-baseline="central">Modern Minecraft proxy server</text>
  </g>

  <!-- ===== Row 2: Backends ===== -->
  <text x="600" y="295" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#737373" letter-spacing="2">BACKENDS</text>
  <line x1="100" y1="301" x2="535" y2="301" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <line x1="665" y1="301" x2="1100" y2="301" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <!-- Paper -->
  <g transform="translate(250, 360)">
    <rect x="-145" y="-40" width="290" height="80" rx="12" fill="rgba(110,231,183,0.04)" stroke="rgba(110,231,183,0.2)" stroke-width="1"/>
    <circle cx="-100" cy="0" r="22" fill="rgba(110,231,183,0.12)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-112, -12) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="-60" y="-6" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">Paper</text>
    <text x="-60" y="14" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#6ee7b7">High-performance fork</text>
    <!-- Recommended -->
    <rect x="72" y="-10" width="58" height="20" rx="10" fill="rgba(110,231,183,0.1)"/>
    <text x="101" y="4" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="8" fill="#6ee7b7" dominant-baseline="central">POPULAR</text>
  </g>

  <!-- Folia -->
  <g transform="translate(600, 360)">
    <rect x="-145" y="-40" width="290" height="80" rx="12" fill="rgba(251,191,36,0.04)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <circle cx="-100" cy="0" r="22" fill="rgba(251,191,36,0.12)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-112, -12) scale(1)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="-60" y="-6" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">Folia</text>
    <text x="-60" y="14" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#fbbf24">Multi-threaded regions</text>
  </g>

  <!-- Purpur -->
  <g transform="translate(950, 360)">
    <rect x="-145" y="-40" width="290" height="80" rx="12" fill="rgba(251,113,133,0.04)" stroke="rgba(251,113,133,0.2)" stroke-width="1"/>
    <circle cx="-100" cy="0" r="22" fill="rgba(251,113,133,0.12)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-112, -12) scale(1)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="-60" y="-6" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">Purpur</text>
    <text x="-60" y="14" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#fb7185">Feature-rich Pufferfish fork</text>
  </g>

  <!-- Spigot -->
  <g transform="translate(250, 470)">
    <rect x="-145" y="-40" width="290" height="80" rx="12" fill="rgba(34,211,238,0.04)" stroke="rgba(34,211,238,0.2)" stroke-width="1"/>
    <circle cx="-100" cy="0" r="22" fill="rgba(34,211,238,0.12)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-112, -12) scale(1)" stroke="#22d3ee" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="-60" y="-6" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">Spigot</text>
    <text x="-60" y="14" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#22d3ee">Widely-used Bukkit fork</text>
  </g>

  <!-- Bukkit -->
  <g transform="translate(600, 470)">
    <rect x="-145" y="-40" width="290" height="80" rx="12" fill="rgba(110,231,183,0.04)" stroke="rgba(110,231,183,0.2)" stroke-width="1"/>
    <circle cx="-100" cy="0" r="22" fill="rgba(110,231,183,0.12)"/>
    <!-- Server icon (Lucide) -->
    <g transform="translate(-112, -12) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="20" height="8" x="2" y="2" rx="2" ry="2" />
      <rect width="20" height="8" x="2" y="14" rx="2" ry="2" />
      <line x1="6" x2="6.01" y1="6" y2="6" />
      <line x1="6" x2="6.01" y1="18" y2="18" />
    </g>
    <text x="-60" y="-6" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">Bukkit</text>
    <text x="-60" y="14" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#6ee7b7">Legacy API support</text>
  </g>

  <!-- MC Version + Java info (bottom right card) -->
  <g transform="translate(950, 470)">
    <rect x="-145" y="-40" width="290" height="80" rx="12" fill="rgba(165,180,252,0.04)" stroke="rgba(165,180,252,0.15)" stroke-width="1"/>
    <text x="-110" y="-8" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="14" fill="#fafafa">Requirements</text>
    <text x="-110" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">MC 1.20 &#8211; 1.21 &#x2022; Java 21+</text>
    <text x="-110" y="28" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">CommandAPI required on all instances</text>
  </g>

  <!-- Bottom text -->
  <text x="600" y="580" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="13" fill="#737373">Not supported: Forge, Fabric, NeoForge (client-side mod loaders)</text>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
</svg>
