<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Section label -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#8268F0" letter-spacing="3">FEATURE</text>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#fafafa" letter-spacing="-1">Powerful YAML Script Engine</text>

  <!-- Subtitle -->
  <text x="600" y="122" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#a3a3a3">Define commands, arguments, permissions, and execution logic in clean YAML files</text>

  <!-- Code editor panel -->
  <g transform="translate(80, 155)">
    <!-- Editor frame -->
    <rect x="0" y="0" width="680" height="410" rx="12" fill="#0c1222" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="680" height="36" rx="12" fill="rgba(255,255,255,0.04)"/>
    <rect x="0" y="24" width="680" height="12" fill="rgba(255,255,255,0.04)"/>
    <!-- Window dots -->
    <circle cx="18" cy="18" r="5" fill="#ff5f57"/>
    <circle cx="36" cy="18" r="5" fill="#ffbd2e"/>
    <circle cx="54" cy="18" r="5" fill="#28c840"/>
    <!-- Filename -->
    <text x="340" y="23" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="11" fill="#737373">alert.yml</text>

    <!-- Line numbers gutter -->
    <rect x="0" y="36" width="40" height="374" fill="rgba(255,255,255,0.02)"/>

    <!-- YAML content with syntax highlighting -->
    <!-- Line numbers -->
    <text x="28" y="64" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 1</text>
    <text x="28" y="84" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 2</text>
    <text x="28" y="104" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 3</text>
    <text x="28" y="124" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 4</text>
    <text x="28" y="144" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 5</text>
    <text x="28" y="164" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 6</text>
    <text x="28" y="184" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 7</text>
    <text x="28" y="204" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 8</text>
    <text x="28" y="224" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568"> 9</text>
    <text x="28" y="244" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">10</text>
    <text x="28" y="264" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">11</text>
    <text x="28" y="284" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">12</text>
    <text x="28" y="304" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">13</text>
    <text x="28" y="324" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">14</text>
    <text x="28" y="344" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">15</text>
    <text x="28" y="364" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">16</text>
    <text x="28" y="384" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">17</text>
    <text x="28" y="404" text-anchor="end" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5" fill="#4a5568">18</text>

    <!-- YAML Code (syntax highlighted matching website theme) -->
    <!-- Line 1: script-version: 3 -->
    <text x="52" y="64" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#8eaadc">script-version</tspan><tspan fill="#a3a3a3">: </tspan><tspan fill="#5eead4">3</tspan></text>
    <!-- Line 2: empty -->
    <!-- Line 3: command: alert -->
    <text x="52" y="104" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#8eaadc">command</tspan><tspan fill="#a3a3a3">: </tspan><tspan fill="#86efac">alert</tspan></text>
    <!-- Line 4: permission: commandbridge.alert -->
    <text x="52" y="124" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#8eaadc">permission</tspan><tspan fill="#a3a3a3">: </tspan><tspan fill="#86efac">commandbridge.alert</tspan></text>
    <!-- Line 5: description: Send an alert to all servers -->
    <text x="52" y="144" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#8eaadc">description</tspan><tspan fill="#a3a3a3">: </tspan><tspan fill="#86efac">Send an alert to all servers</tspan></text>
    <!-- Line 6: empty -->
    <!-- Line 7: arguments: -->
    <text x="52" y="184" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#8eaadc">arguments</tspan><tspan fill="#a3a3a3">:</tspan></text>
    <!-- Line 8:   message: -->
    <text x="52" y="204" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">  </tspan><tspan fill="#8eaadc">message</tspan><tspan fill="#a3a3a3">:</tspan></text>
    <!-- Line 9:     type: GREEDY_STRING -->
    <text x="52" y="224" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">    </tspan><tspan fill="#8eaadc">type</tspan><tspan fill="#a3a3a3">: </tspan><tspan fill="#c084fc">GREEDY_STRING</tspan></text>
    <!-- Line 10: empty -->
    <!-- Line 11: actions: -->
    <text x="52" y="264" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#8eaadc">actions</tspan><tspan fill="#a3a3a3">:</tspan></text>
    <!-- Line 12:   proxy: -->
    <text x="52" y="284" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">  </tspan><tspan fill="#8eaadc">proxy</tspan><tspan fill="#a3a3a3">:</tspan></text>
    <!-- Line 13:     - "[message] ${message}" -->
    <text x="52" y="304" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">    - </tspan><tspan fill="#86efac">"[message] ${message}"</tspan></text>
    <!-- Line 14:   all_backends: -->
    <text x="52" y="324" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">  </tspan><tspan fill="#8eaadc">all_backends</tspan><tspan fill="#a3a3a3">:</tspan></text>
    <!-- Line 15:     execute-as: CONSOLE -->
    <text x="52" y="344" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">    </tspan><tspan fill="#8eaadc">execute-as</tspan><tspan fill="#a3a3a3">: </tspan><tspan fill="#c084fc">CONSOLE</tspan></text>
    <!-- Line 16:     commands: -->
    <text x="52" y="364" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">    </tspan><tspan fill="#8eaadc">commands</tspan><tspan fill="#a3a3a3">:</tspan></text>
    <!-- Line 17:       - "broadcast &c[Alert] &f${message}" -->
    <text x="52" y="384" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#a3a3a3">      - </tspan><tspan fill="#86efac">"broadcast &amp;c[Alert] &amp;f${message}"</tspan></text>
    <!-- Line 18: empty or end -->
    <text x="52" y="404" font-family="ui-monospace, 'SF Mono', 'Cascadia Code', monospace" font-size="12.5"><tspan fill="#64748b"># One file per command</tspan></text>
  </g>

  <!-- Right side: Feature badges -->
  <g transform="translate(820, 170)">
    <!-- Badge: 21 Argument Types -->
    <rect x="0" y="0" width="300" height="72" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="36" cy="36" r="18" fill="rgba(192,132,252,0.12)"/>
    <text x="36" y="41" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="800" font-size="14" fill="#c084fc">21</text>
    <text x="70" y="30" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa">Argument Types</text>
    <text x="70" y="48" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#737373">STRING, INTEGER, PLAYERS, LOCATION...</text>

    <!-- Badge: Tab Completion -->
    <rect x="0" y="88" width="300" height="72" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="36" cy="124" r="18" fill="rgba(96,165,250,0.12)"/>
    <!-- Tab key icon -->
    <text x="36" y="129" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="#60a5fa">TAB</text>
    <text x="70" y="118" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa">Tab Completion</text>
    <text x="70" y="136" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#737373">Full auto-complete via CommandAPI</text>

    <!-- Badge: Placeholders -->
    <rect x="0" y="176" width="300" height="72" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="36" cy="212" r="18" fill="rgba(110,231,183,0.12)"/>
    <text x="36" y="217" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="700" font-size="11" fill="#6ee7b7">${}</text>
    <text x="70" y="206" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa">Named Placeholders</text>
    <text x="70" y="224" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#737373">${name}, ${server}, ${player}...</text>

    <!-- Badge: PlaceholderAPI -->
    <rect x="0" y="264" width="300" height="72" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="36" cy="300" r="18" fill="rgba(251,191,36,0.12)"/>
    <text x="36" y="305" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="10" fill="#fbbf24">PAPI</text>
    <text x="70" y="294" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa">PlaceholderAPI</text>
    <text x="70" y="312" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#737373">Optional via PapiProxyBridge</text>

    <!-- Badge: Hot Reload -->
    <rect x="0" y="352" width="300" height="72" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
    <circle cx="36" cy="388" r="18" fill="rgba(251,113,133,0.12)"/>
    <!-- Refresh-cw icon (Lucide) -->
    <g transform="translate(24, 376) scale(1)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" />
      <path d="M21 3v5h-5" />
      <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" />
      <path d="M8 16H3v5" />
    </g>
    <text x="70" y="382" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa">Hot Reload</text>
    <text x="70" y="400" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#737373">/cb reload - no restart needed</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
</svg>
