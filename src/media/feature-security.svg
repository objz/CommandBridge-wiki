<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Section label -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#8268F0" letter-spacing="3">FEATURE</text>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#fafafa" letter-spacing="-1">Secure by Default</text>

  <!-- Subtitle -->
  <text x="600" y="122" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#a3a3a3">HMAC-SHA256 mutual authentication and optional TLS encryption</text>

  <!-- ===== Authentication Card (Left) ===== -->
  <g transform="translate(80, 155)">
    <rect x="0" y="0" width="460" height="410" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(110,231,183,0.15)" stroke-width="1"/>

    <!-- Header area -->
    <g transform="translate(30, 28)">
      <!-- Shield-check icon -->
      <circle cx="24" cy="24" r="24" fill="rgba(110,231,183,0.1)"/>
      <g transform="translate(12, 12) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
        <path d="m9 12 2 2 4-4" />
      </g>

      <text x="62" y="20" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#fafafa">Authentication</text>
      <text x="62" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#6ee7b7">HMAC-SHA256 signing</text>
    </g>

    <!-- Divider -->
    <line x1="30" y1="88" x2="430" y2="88" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Item 1: HMAC-SHA256 message signing -->
    <g transform="translate(30, 110)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <g transform="translate(4, 4) scale(0.667)" stroke="#6ee7b7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="17" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="14" fill="#e5e5e5">HMAC-SHA256 message signing</text>
    </g>

    <!-- Item 2: Mutual proxy-backend auth -->
    <g transform="translate(30, 170)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <g transform="translate(4, 4) scale(0.667)" stroke="#6ee7b7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="17" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="14" fill="#e5e5e5">Mutual proxy-backend auth</text>
    </g>

    <!-- Item 3: Zero-config — secure out of the box -->
    <g transform="translate(30, 230)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <g transform="translate(4, 4) scale(0.667)" stroke="#6ee7b7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="17" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="14" fill="#e5e5e5">Zero-config - secure out of the box</text>
    </g>

    <!-- Item 4: Prevents replay attacks -->
    <g transform="translate(30, 290)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <g transform="translate(4, 4) scale(0.667)" stroke="#6ee7b7" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="17" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="14" fill="#e5e5e5">Prevents replay attacks</text>
    </g>
  </g>

  <!-- ===== TLS Encryption Card (Right) ===== -->
  <g transform="translate(660, 155)">
    <rect x="0" y="0" width="460" height="410" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(130,104,240,0.15)" stroke-width="1"/>

    <!-- Header area -->
    <g transform="translate(30, 28)">
      <!-- Lock icon -->
      <circle cx="24" cy="24" r="24" fill="rgba(130,104,240,0.1)"/>
      <g transform="translate(12, 12) scale(1)" stroke="#8268F0" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </g>

      <text x="62" y="20" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#fafafa">TLS Encryption</text>
      <text x="62" y="38" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#8268F0">3 trust verification modes</text>
    </g>

    <!-- TLS 1.3 badge -->
    <rect x="352" y="12" width="78" height="24" rx="12" fill="rgba(130,104,240,0.12)" stroke="rgba(130,104,240,0.25)" stroke-width="0.75"/>
    <text x="391" y="28" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#8268F0">TLS 1.3</text>

    <!-- Divider -->
    <line x1="30" y1="88" x2="430" y2="88" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Trust Mode 1: TOFU — green -->
    <g transform="translate(30, 106)">
      <rect x="0" y="0" width="400" height="80" rx="10" fill="rgba(110,231,183,0.04)" stroke="rgba(110,231,183,0.12)" stroke-width="1"/>
      <!-- shield-check icon -->
      <circle cx="40" cy="40" r="18" fill="rgba(110,231,183,0.1)"/>
      <g transform="translate(28, 28) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
        <path d="m9 12 2 2 4-4" />
      </g>
      <text x="72" y="30" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">TOFU</text>
      <text x="72" y="48" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">Trust on First Use - auto-pin certificates on first connection</text>
      <!-- Default badge -->
      <rect x="312" y="14" width="72" height="20" rx="10" fill="rgba(110,231,183,0.1)" stroke="rgba(110,231,183,0.2)" stroke-width="0.75"/>
      <text x="348" y="28" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="9" fill="#6ee7b7">DEFAULT</text>
    </g>

    <!-- Trust Mode 2: STRICT — blue -->
    <g transform="translate(30, 202)">
      <rect x="0" y="0" width="400" height="80" rx="10" fill="rgba(96,165,250,0.04)" stroke="rgba(96,165,250,0.12)" stroke-width="1"/>
      <!-- lock icon -->
      <circle cx="40" cy="40" r="18" fill="rgba(96,165,250,0.1)"/>
      <g transform="translate(28, 28) scale(1)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </g>
      <text x="72" y="30" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">STRICT</text>
      <text x="72" y="48" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">Certificate Pinning - pre-configured trusted certificates only</text>
    </g>

    <!-- Trust Mode 3: PLAIN — amber -->
    <g transform="translate(30, 298)">
      <rect x="0" y="0" width="400" height="80" rx="10" fill="rgba(251,191,36,0.04)" stroke="rgba(251,191,36,0.12)" stroke-width="1"/>
      <!-- lock-open icon -->
      <circle cx="40" cy="40" r="18" fill="rgba(251,191,36,0.1)"/>
      <g transform="translate(28, 28) scale(1)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 9.9-1" />
      </g>
      <text x="72" y="30" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="15" fill="#fafafa">PLAIN</text>
      <text x="72" y="48" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">No Encryption - for trusted networks or local development</text>
    </g>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
</svg>
