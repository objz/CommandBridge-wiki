<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8268F0"/>
      <stop offset="100%" stop-color="#4736D3"/>
    </linearGradient>
    <radialGradient id="shield-glow" cx="50%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#4736D3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#4736D3" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
    <filter id="shield-blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.278 0 0 0 0 0.212 0 0 0 0 0.82 0 0 0 0.4 0"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#shield-glow)"/>

  <!-- Section label -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#8268F0" letter-spacing="3">FEATURE</text>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#fafafa" letter-spacing="-1">Secure by Default</text>

  <!-- Subtitle -->
  <text x="600" y="122" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#a3a3a3">HMAC-SHA256 mutual authentication and optional TLS encryption</text>

  <!-- Central shield icon (large, Lucide) -->
  <g transform="translate(600, 270)" filter="url(#shield-blur)">
    <!-- Shield background glow -->
    <g transform="translate(-55, -60) scale(4.583)" stroke="url(#shield-grad)" stroke-width="1.5" fill="url(#shield-grad)" fill-opacity="0.9" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
    </g>
    <!-- Shield outline -->
    <g transform="translate(-55, -60) scale(4.583)" stroke="#a5b4fc" stroke-width="0.4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2 0 4.5-1.2 6.24-2.72a1.17 1.17 0 0 1 1.52 0C14.51 3.81 17 5 19 5a1 1 0 0 1 1 1z" />
    </g>
    <!-- Lock icon inside shield (Lucide) -->
    <g transform="translate(-16, -16) scale(1.333)" stroke="#fafafa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </g>
  </g>

  <!-- HMAC label -->
  <rect x="475" y="350" width="250" height="36" rx="18" fill="rgba(165,180,252,0.1)" stroke="rgba(165,180,252,0.25)" stroke-width="1"/>
  <text x="600" y="373" text-anchor="middle" font-family="Inter, monospace" font-weight="600" font-size="13" fill="#a5b4fc">HMAC-SHA256 Authentication</text>

  <!-- Three trust modes -->
  <!-- TOFU -->
  <g transform="translate(220, 440)">
    <rect x="-120" y="-30" width="240" height="130" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(110,231,183,0.2)" stroke-width="1"/>
    <!-- Check icon (Lucide) -->
    <circle cx="0" cy="-2" r="20" fill="rgba(110,231,183,0.1)"/>
    <g transform="translate(-12, -14) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M20 6 9 17l-5-5" />
    </g>
    <text x="0" y="36" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">TOFU</text>
    <text x="0" y="56" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">Trust on First Use</text>
    <text x="0" y="74" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">Auto-pin certificates</text>
    <text x="0" y="88" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">on first connection</text>
  </g>

  <!-- STRICT -->
  <g transform="translate(600, 440)">
    <rect x="-120" y="-30" width="240" height="130" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(96,165,250,0.2)" stroke-width="1"/>
    <!-- Lock icon (Lucide) -->
    <circle cx="0" cy="-2" r="20" fill="rgba(96,165,250,0.1)"/>
    <g transform="translate(-12, -14) scale(1)" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </g>
    <text x="0" y="36" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">STRICT</text>
    <text x="0" y="56" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">Certificate Pinning</text>
    <text x="0" y="74" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">Pre-configured trusted</text>
    <text x="0" y="88" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">certificates only</text>
  </g>

  <!-- PLAIN -->
  <g transform="translate(980, 440)">
    <rect x="-120" y="-30" width="240" height="130" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(251,191,36,0.2)" stroke-width="1"/>
    <!-- Lock icon (Lucide) -->
    <circle cx="0" cy="-2" r="20" fill="rgba(251,191,36,0.1)"/>
    <g transform="translate(-12, -14) scale(1)" stroke="#fbbf24" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect width="18" height="11" x="3" y="11" rx="2" ry="2" />
      <path d="M7 11V7a5 5 0 0 1 10 0v4" />
    </g>
    <text x="0" y="36" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="16" fill="#fafafa">PLAIN</text>
    <text x="0" y="56" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11" fill="#a3a3a3">No Encryption</text>
    <text x="0" y="74" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">For trusted networks</text>
    <text x="0" y="88" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="10" fill="#737373">or local development</text>
  </g>

  <!-- Connecting dashed lines from shield to modes -->
  <line x1="560" y1="340" x2="220" y2="410" stroke="rgba(165,180,252,0.15)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="600" y1="340" x2="600" y2="410" stroke="rgba(165,180,252,0.15)" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="640" y1="340" x2="980" y2="410" stroke="rgba(165,180,252,0.15)" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- TLS label pills (centered below HMAC label) -->
  <rect x="505" y="392" width="60" height="20" rx="10" fill="rgba(110,231,183,0.1)" stroke="rgba(110,231,183,0.15)" stroke-width="0.75"/>
  <text x="535" y="406" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="8.5" fill="#6ee7b7">TLS 1.3</text>
  <rect x="575" y="392" width="80" height="20" rx="10" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.15)" stroke-width="0.75"/>
  <text x="615" y="406" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="500" font-size="8.5" fill="#60a5fa">Encrypted</text>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
</svg>
