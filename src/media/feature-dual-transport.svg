<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap');</style>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#273a66"/>
      <stop offset="100%" stop-color="#081123"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4736D3"/>
      <stop offset="100%" stop-color="#8268F0"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="rgba(255,255,255,0.04)"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Section label -->
  <text x="600" y="52" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="11" fill="#8268F0" letter-spacing="3">FEATURE</text>

  <!-- Title -->
  <text x="600" y="92" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="36" fill="#fafafa" letter-spacing="-1">Choose Your Transport</text>

  <!-- Subtitle -->
  <text x="600" y="122" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="16" fill="#a3a3a3">Two built-in transport options to fit any network architecture</text>

  <!-- "or" divider -->
  <line x1="600" y1="165" x2="600" y2="565" stroke="rgba(255,255,255,0.06)" stroke-width="1" stroke-dasharray="4 6"/>
  <rect x="580" y="340" width="40" height="28" rx="14" fill="#0c1222" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="600" y="359" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="12" fill="#737373">or</text>

  <!-- ===== WebSocket Card (Left) ===== -->
  <g transform="translate(80, 155)">
    <rect x="0" y="0" width="460" height="420" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(125,211,252,0.15)" stroke-width="1"/>

    <!-- Header area -->
    <g transform="translate(30, 30)">
      <!-- Radio icon (Lucide) -->
      <circle cx="24" cy="24" r="24" fill="rgba(125,211,252,0.1)"/>
      <g transform="translate(12, 12) scale(1)" stroke="#7dd3fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9" />
        <path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5" />
        <circle cx="12" cy="12" r="2" />
        <path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5" />
        <path d="M19.1 4.9C23 8.8 23 15.1 19.1 19" />
      </g>

      <text x="62" y="22" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#fafafa">WebSocket</text>
      <text x="62" y="40" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#7dd3fc">Direct proxy-to-backend</text>
    </g>

    <!-- Divider -->
    <line x1="30" y1="90" x2="430" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Feature list -->
    <!-- Item 1 -->
    <g transform="translate(30, 110)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">Direct Connections</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Proxy connects directly to each backend</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(30, 175)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">TLS Encryption</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Optional TLS with TOFU or STRICT modes</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(30, 240)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">No External Dependencies</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Built-in, no additional services required</text>
    </g>

    <!-- Item 4 -->
    <g transform="translate(30, 305)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">Auto-Reconnect</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Built-in reconnect handling on disconnect</text>
    </g>

    <!-- Recommended badge -->
    <rect x="310" y="12" width="120" height="24" rx="12" fill="rgba(110,231,183,0.12)" stroke="rgba(110,231,183,0.25)" stroke-width="0.75"/>
    <text x="370" y="28" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#6ee7b7">RECOMMENDED</text>
  </g>

  <!-- ===== Redis Card (Right) ===== -->
  <g transform="translate(660, 155)">
    <rect x="0" y="0" width="460" height="420" rx="16" fill="rgba(255,255,255,0.03)" stroke="rgba(251,113,133,0.15)" stroke-width="1"/>

    <!-- Header area -->
    <g transform="translate(30, 30)">
      <!-- Database icon (Lucide) -->
      <circle cx="24" cy="24" r="24" fill="rgba(251,113,133,0.1)"/>
      <g transform="translate(12, 12) scale(1)" stroke="#fb7185" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <ellipse cx="12" cy="5" rx="9" ry="3" />
        <path d="M3 5V19A9 3 0 0 0 21 19V5" />
        <path d="M3 12A9 3 0 0 0 21 12" />
      </g>

      <text x="62" y="22" font-family="Inter, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#fafafa">Redis</text>
      <text x="62" y="40" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="12" fill="#fb7185">Centralized message broker</text>
    </g>

    <!-- Divider -->
    <line x1="30" y1="90" x2="430" y2="90" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Feature list -->
    <!-- Item 1 -->
    <g transform="translate(30, 110)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">NAT &amp; Firewall Friendly</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Works behind any network topology</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(30, 175)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">Existing Infrastructure</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Leverage your existing Redis deployment</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(30, 240)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">Pub/Sub Isolation</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Dedicated channels for clean separation</text>
    </g>

    <!-- Item 4 -->
    <g transform="translate(30, 305)">
      <circle cx="12" cy="12" r="12" fill="rgba(110,231,183,0.1)"/>
      <!-- Check icon (Lucide) -->
      <g transform="translate(0, 0) scale(1)" stroke="#6ee7b7" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6 9 17l-5-5" />
      </g>
      <text x="34" y="12" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="14" fill="#fafafa" dominant-baseline="central">Multi-Proxy Support</text>
      <text x="34" y="32" font-family="Inter, -apple-system, sans-serif" font-weight="400" font-size="11.5" fill="#737373">Multiple Velocity instances via act-as-client</text>
    </g>

    <!-- Scalable badge -->
    <rect x="328" y="12" width="102" height="24" rx="12" fill="rgba(251,113,133,0.12)" stroke="rgba(251,113,133,0.25)" stroke-width="0.75"/>
    <text x="379" y="28" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-weight="600" font-size="10" fill="#fb7185">SCALABLE</text>
  </g>

  <!-- Bottom accent -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)" opacity="0.4"/>
</svg>
